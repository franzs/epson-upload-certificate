name: Python Code Quality

on:
  pull_request:
    branches: [ "main" ]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      python_versions: ${{ steps.set-versions.outputs.python_versions }}
    steps:
      - name: Set Python versions
        id: set-versions
        run: echo 'python_versions=["3.10", "3.11", "3.12", "3.13", "3.14"]' >> $GITHUB_OUTPUT

  pylint:
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python_versions) }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py') --fail-under=9.0

  mypy:
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python_versions) }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Analysing the code with mypy
      run: |
        mypy $(git ls-files '*.py') --install-types --non-interactive

  black:
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-black
        restore-keys: |
          ${{ runner.os }}-pip-black

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black

    - name: Check syntax with black
      run: |
        black --skip-string-normalization --check --diff $(git ls-files '*.py')

  quality-gate:
    runs-on: ubuntu-latest
    needs: [pylint, mypy, black]
    steps:
      - name: All checks passed
        run: echo "pylint, mypy, and black passed — good to merge!"
